<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seu imóvel dos sonhos</title>

    <style>
.estilo{
    background:#719ef1;
    padding:20px;
    text-align:center;
    border-radius:2px;
     margin:0;
     width:100%;

}

        /* ======= ESTILO GERAL ======= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
    
}

body{

    background:#d6e6ff;
    padding:1px;

}

/* ======= TÍTULO ======= */

h3{

    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;

}

.estilo h3{
    color:white;
}

/* ======= FORMULÁRIO ======= */

input{

    width:100%;
    padding:12px;
    margin:8px 0;

    border:1px solid #cfdcf7;
    border-radius:8px;

    font-size:16px;

}

input:focus{

    outline:none;
    border:1px solid #0d6efd;

}

/* ======= BOTÕES ======= */

button{

    background:#0d6efd;
    color:white;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

    margin-top:10px;

    transition:.3s;

}

button:hover{

    background:#084298;

}

/* ======= LISTA ======= */

#lista{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    margin-top:30px;

}

/* ======= CARD ======= */

.card{

    width:300px;

    background:white;

    border-radius:12px;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

    overflow:hidden;

    transition:.3s;

    padding:15px;

}

.card:hover{

    transform:translateY(-5px);

}

.card img{

    width:100%;

    height:200px;

    object-fit:cover;

    border-radius:10px;

}

.card h3{

    margin-top:15px;

    color:#0d6efd;

}

.card p{

    margin-top:8px;

    color:#444;

    font-size:15px;

}

.card button{

    width:100%;

    margin-top:15px;

}

/* ======= RESPONSIVO ======= */

@media(max-width:700px){

    .card{

        width:100%;

    }

}

    </style>
</head>
<body>

    <div class="estilo">
        <h3>imovel dos sonhos</h3>
    </div>

    <button id="adimin_corretor" onclick="adimin_corretor()"> loguin Adiministrador</button>

    <div id="login" style="display: none">

        <h2>corretor</h2>

        <input type="text" id="usuario" placeholder="Usuário">

        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">
            Entrar como Administrador
        </button>

    </div>

    <div id="visitante_login" style="display: none">
        <button onclick="visitante()">
            Modo visitante
        </button>
    </div>

    <!-- ================= PAINEL ADMIN ================= -->

    <div id="painelAdmin" style="display:none;">

        <button onclick="sair()">Sair</button>

        <br><br>

        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="Descricao" placeholder="Descrição">
        <input type="number" id="preco" placeholder="Preço">
        <input type="text" id="comados" placeholder="Quantidade de cômodos">
        <input type="number" id="construcao_metragem" placeholder="Construção">
        <input type="number" id="Terreno_metragem" placeholder="Terreno">
        <input type="number" id="whatsapp" placeholder="whatsapp do vendedor">
        <input type="file" id="imagem" accept="image/*">

        <button onclick="cadastrar()">
            Salvar
        </button>

    </div>

    <!-- ================= PAINEL VISITANTE ================= -->

    <div id="painelVisitante" style="display:none;">

        <button onclick="sair()">
            Voltar ao Login
        </button>

    </div>

    <hr>

    <div id="lista"></div>

    <script>

        const usuarioAdmin = "a";
        const senhaAdmin = "1";

        let administrador = false;
        let indiceEditando = -1;

        const imoveis = JSON.parse(localStorage.getItem("imoveis")) || [];

        function adimin_corretor(){
            const login = document.getElementById("login");
            const visitante = document.getElementById("visitante_login");

            if(login.style.display === "none" || login.style.display === ""){
                login.style.display = "block";
                visitante.style.display = "block";
            }else{
                login.style.display = "none";
                visitante.style.display = "none";   // BUG 3 corrigido: faltava ".display"
            }
        }

        function login(){

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            if(usuario === usuarioAdmin && senha === senhaAdmin){

                administrador = true;

                document.getElementById("login").style.display = "none";
                document.getElementById("visitante_login").style.display = "none";
                document.getElementById("painelAdmin").style.display = "block";
                document.getElementById("painelVisitante").style.display = "none";

                mostrar();

            }else{

                alert("Usuário ou senha incorretos!");

            }

        }

        function visitante(){

            administrador = false;

            document.getElementById("login").style.display = "none";
            document.getElementById("visitante_login").style.display = "none";
            document.getElementById("painelAdmin").style.display = "none";
            document.getElementById("painelVisitante").style.display = "block";

            mostrar();

        }

        function sair(){

            administrador = false;

            document.getElementById("usuario").value = "";
            document.getElementById("senha").value = "";

            document.getElementById("login").style.display = "none";
            document.getElementById("visitante_login").style.display = "none";
            document.getElementById("painelAdmin").style.display = "none";
            document.getElementById("painelVisitante").style.display = "none";

            mostrar();

        }

        function cadastrar(){

            const titulo = document.getElementById("titulo").value;
            const descricao = document.getElementById("Descricao").value;
            const preco = document.getElementById("preco").value;
            const comados = document.getElementById("comados").value;
            const construcao = document.getElementById("construcao_metragem").value;
            const terreno = document.getElementById("Terreno_metragem").value;
            const whatsapp = document.getElementById("whatsapp").value;
            const arquivo = document.getElementById("imagem").files[0];

            if(arquivo){

                const leitor = new FileReader();

                leitor.onload = function(){

                    salvar(leitor.result);

                }

                leitor.readAsDataURL(arquivo);

            }else{

                let imagem = "";

                if(indiceEditando != -1){

                    imagem = imoveis[indiceEditando].imagem;

                }

                salvar(imagem);

            }

            function salvar(imagem){

                const imovel = {

                    titulo,
                    descricao,
                    preco,
                    comados,
                    construcao,
                    terreno,
                    imagem,
                    whatsapp

                };

                if(indiceEditando == -1){

                    imoveis.push(imovel);

                }else{

                    imoveis[indiceEditando] = imovel;

                    indiceEditando = -1;

                }

                localStorage.setItem("imoveis", JSON.stringify(imoveis));

                document.getElementById("titulo").value = "";
                document.getElementById("Descricao").value = "";
                document.getElementById("preco").value = "";
                document.getElementById("comados").value = "";
                document.getElementById("construcao_metragem").value = "";
                document.getElementById("Terreno_metragem").value = "";
                document.getElementById("imagem").value = "";
                document.getElementById("whatsapp").value = "";

                mostrar();

            }

        }

        function mostrar(){

            const lista = document.getElementById("lista");

            lista.innerHTML = "";

            imoveis.forEach(function(imovel, indice){

                lista.innerHTML += `

                <div class="card">

                    ${imovel.imagem ? `<img src="${imovel.imagem}" width="250">` : ""}

                    <h3>${imovel.titulo}</h3>

                    <p>${imovel.descricao}</p>

                    <p><b>Preço:</b> R$ ${imovel.preco}</p>

                    <p><b>Cômodos:</b> ${imovel.comados}</p>

                    <p><b>Construção:</b> ${imovel.construcao} m²</p>

                    <p><b>Terreno:</b> ${imovel.terreno} m²</p>

                    ${
                        administrador
                        ?
                        `
                        <button onclick="editar(${indice})">Editar</button>
                        <button onclick="excluir(${indice})">Excluir</button>
                        `
                        :
                        `
                        <button onclick="contato(${indice})">conversar com vendedor</button>
                        <div id="area_contato_${indice}" style="display:none;"></div>
                        `
                    }

                </div>

                `;

            });

        }

        function contato(indice){   // BUG 1 corrigido: agora recebe "indice"

            const area = document.getElementById("area_contato_" + indice);   // BUG 2 corrigido: nome igual ao criado em mostrar()

            area.innerHTML = `
                <input type="text" id="nome_visitante_${indice}" placeholder="Seu nome">
                <input type="text" id="telefone_visitante_${indice}" placeholder="Seu telefone">
                <input type="text" id="email_visitante_${indice}" placeholder="Seu email">
                <button onclick="enviarContato(${indice})">Enviar</button>
            `;

            area.style.display = "block";

        }

        function enviarContato(indice){

            const imovel = imoveis[indice];

            const nome = document.getElementById("nome_visitante_" + indice).value;
            const telefone = document.getElementById("telefone_visitante_" + indice).value;
            const email = document.getElementById("email_visitante_" + indice).value;

            const mensagem = "Olá, meu nome é " + nome +
                              ". Telefone: " + telefone +
                              ". Email: " + email +
                              ". Tenho interesse no imóvel: " + imovel.titulo;

            const link = "https://wa.me/" + imovel.whatsapp + "?text=" + encodeURIComponent(mensagem);

            window.open(link, "_blank");

        }

        function editar(indice){

            indiceEditando = indice;

            const imovel = imoveis[indice];

            document.getElementById("titulo").value = imovel.titulo;
            document.getElementById("Descricao").value = imovel.descricao;
            document.getElementById("preco").value = imovel.preco;
            document.getElementById("comados").value = imovel.comados;
            document.getElementById("construcao_metragem").value = imovel.construcao;
            document.getElementById("Terreno_metragem").value = imovel.terreno;
            document.getElementById("whatsapp").value = imovel.whatsapp;

        }

        function excluir(indice){

            if(confirm("Deseja excluir este imóvel?")){

                imoveis.splice(indice,1);

                localStorage.setItem("imoveis", JSON.stringify(imoveis));

                mostrar();

            }

        }

        mostrar();

    </script>

</body>
</html>
